<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero-Reflow GM3 Button Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet" />

  <style>
    :root {
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-surface-container: #F3EDF7;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;

      --md-sys-motion-easing-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
      --md-sys-motion-duration-long: 600ms;
    }

    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; background-color: var(--md-sys-color-surface);
      font-family: 'Google Sans', sans-serif;
    }

    /*
     * The container layout is static. Flex is only used to establish the base
     * unselected geometry (144px per button) exactly once on page load.
     */
    .m3-button-group {
      display: flex;
      gap: 8px;
      padding: 16px;
      background-color: var(--md-sys-color-surface-container);
      border-radius: 999px;
      width: 480px;
      box-sizing: border-box;
    }

    .m3-button-group input[type="radio"] { display: none; }

    /*
     * The Buttons are strictly animated using Compositor Thread properties
     */
    .m3-button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      flex: 1; /* Sets exact 1/3 hitboxes initially */
      cursor: pointer;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      color: var(--md-sys-color-on-surface-variant);

      /* Apply CSS variable transforms mathematically */
      transform: translateX(var(--shift, 0px)) scaleX(var(--scale, 1));
      border-radius: var(--rad, 24px / 24px);

      will-change: transform, border-radius;
      transition:
        transform var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-spring),
        border-radius var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-spring),
        color 300ms ease;
    }

    /* Prevent text stretch using Inverse Scaling Matrix */
    .btn-content {
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
      position: relative;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 500;
      pointer-events: none;

      transform: scale(var(--inv-x, 1), var(--inv-y, 1));
      will-change: transform;
      transition: transform var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-spring);
    }

    .material-symbols-rounded { font-size: 20px; }

    /* Hover states properly respect the counter-scaled border radii natively */
    .m3-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: currentColor;
      opacity: 0;
      transition: opacity 200ms ease;
      z-index: 1;
      pointer-events: none;
    }
    .m3-button:hover::before { opacity: 0.08; }
    .m3-button:active::before { opacity: 0.12; }

    /* Background Active Scale Element */
    .m3-button-bg {
      position: absolute;
      inset: 0;
      background-color: var(--md-sys-color-primary-container);
      opacity: 0;
      transform: scale(0.9);
      transition:
        opacity 300ms ease,
        transform var(--md-sys-motion-duration-long) var(--md-sys-motion-easing-spring);
      z-index: 0;
    }

    /* General Active State Changes */
    .m3-button:has(input:checked) .m3-button-bg {
      opacity: 1;
      transform: scale(1);
    }
    .m3-button:has(input:checked) {
      color: var(--md-sys-color-on-primary-container);
    }

    /* =========================================================================
       ZERO-REFLOW PHYSICS MATRIX
       Using :has(), we alter the CSS variables for the exact geometric layout.
       X-Translates are calculated exactly to mimic standard Flex Box shifting.
       ========================================================================= */

    /* STATE 1: REWRITE (Left Button) Active */
    .m3-button-group:has(.btn-1 input:checked) .btn-1 {
      --shift: 36px; --scale: 1.5; --rad: 10.666px / 16px;
      --inv-x: 0.7; --inv-y: 1.05; /* 0.7 counter-scale * 1.05 selection pop */
    }
    .m3-button-group:has(.btn-1 input:checked) .btn-2 {
      --shift: 54px; --scale: 0.75; --rad: 32px / 24px;
      --inv-x: 1.333333; --inv-y: 1;
    }
    .m3-button-group:has(.btn-1 input:checked) .btn-3 {
      --shift: 18px; --scale: 0.75; --rad: 32px / 24px;
      --inv-x: 1.333333; --inv-y: 1;
    }

    /* STATE 2: SUMMARIZE (Center Button) Active */
    .m3-button-group:has(.btn-2 input:checked) .btn-1 {
      --shift: -18px; --scale: 0.75; --rad: 32px / 24px;
      --inv-x: 1.333333; --inv-y: 1;
    }
    .m3-button-group:has(.btn-2 input:checked) .btn-2 {
      --shift: 0px; --scale: 1.5; --rad: 10.666px / 16px;
      --inv-x: 0.7; --inv-y: 1.05;
    }
    .m3-button-group:has(.btn-2 input:checked) .btn-3 {
      --shift: 18px; --scale: 0.75; --rad: 32px / 24px;
      --inv-x: 1.333333; --inv-y: 1;
    }

    /* STATE 3: TRANSLATE (Right Button) Active */
    .m3-button-group:has(.btn-3 input:checked) .btn-1 {
      --shift: -18px; --scale: 0.75; --rad: 32px / 24px;
      --inv-x: 1.333333; --inv-y: 1;
    }
    .m3-button-group:has(.btn-3 input:checked) .btn-2 {
      --shift: -54px; --scale: 0.75; --rad: 32px / 24px;
      --inv-x: 1.333333; --inv-y: 1;
    }
    .m3-button-group:has(.btn-3 input:checked) .btn-3 {
      --shift: -36px; --scale: 1.5; --rad: 10.666px / 16px;
      --inv-x: 0.7; --inv-y: 1.05;
    }

    /* Point-of-origin Ripple Effect */
    .ripple {
      position: absolute;
      background: currentColor;
      border-radius: 50%;
      opacity: 0.12;
      transform: scale(0);
      animation: ripple-enter 600ms cubic-bezier(0.2, 0, 0, 1) forwards;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes ripple-enter {
      to { transform: scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="m3-button-group">
  <label class="m3-button btn-1">
    <input type="radio" name="ai_actions" value="rewrite" checked>
    <div class="m3-button-bg"></div>
    <div class="btn-content">
      <span class="material-symbols-rounded">auto_fix_high</span>
      <span>Rewrite</span>
    </div>
  </label>

  <label class="m3-button btn-2">
    <input type="radio" name="ai_actions" value="summarize">
    <div class="m3-button-bg"></div>
    <div class="btn-content">
      <span class="material-symbols-rounded">short_text</span>
      <span>Summarize</span>
    </div>
  </label>

  <label class="m3-button btn-3">
    <input type="radio" name="ai_actions" value="translate">
    <div class="m3-button-bg"></div>
    <div class="btn-content">
      <span class="material-symbols-rounded">translate</span>
      <span>Translate</span>
    </div>
  </label>
</div>

<!-- Script identically matches visual coordinates because transforms track layout native pointer offsets -->
<script>
  document.querySelectorAll('.m3-button').forEach(button => {
    button.addEventListener('pointerdown', function (e) {
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const ripple = document.createElement('span');
      ripple.classList.add('ripple');

      const size = Math.max(rect.width, rect.height) * 2;
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${x - size / 2}px`;
      ripple.style.top = `${y - size / 2}px`;

      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
</script>

</body>
</html>
