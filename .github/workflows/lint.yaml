# Lint workflow
#
name: Lint Projects

on:

  # Runs on pull request open to listed branches
  pull_request:
    branches: [ "main", "dev" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:

  # Lint job
  lint:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: CI/CD

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node
        uses: actions/setup-node@v6.1.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install (Vercel) Turbo
        id: install-vercel-turbo
        run: pnpm i -g turbo

      - name: Install dependencies
        run: pnpm i

      - name: Restore Turbo Cache
        uses: actions/cache/restore@v5
        id: restore-turbo-cache
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('packages/**/*.ts', 'packages/**/*.tsx', 'packages/**/*.css', 'packages/**/*.js', 'packages/**/*.mjs', 'pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Run Lint
        run: turbo build lint

      - if: ${{ steps.restore-turbo-cache.outputs.cache-hit != 'true' }}
        name: Save Turbo Cache
        uses: actions/cache/save@v5
        with:
          path: .turbo
          key: ${{ steps.restore-turbo-cache.outputs.cache-primary-key }}
